version: '3'
services:
  web:
    # Path to dockerfile.
    # '.' represents the current directory in which
    # docker-compose.yml is present.
    build: .

    # Mapping of container port to host
    ports:
      - "2508:80"
    environment:
      - ASPNETCORE_URLS=http://+80

    networks:
      github:
        aliases:
          - github

networks:
  github:
    name: github